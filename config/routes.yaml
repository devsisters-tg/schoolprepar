# =======================================================
# SchoolPrepar — Routes (TP3)
# Les routes CRUD admin utilisent le préfixe @Route dans
# les controllers (annotations). Ce fichier déclare les
# routes front-office et le dashboard admin.
# =======================================================

# =============================================
# FRONT-OFFICE
# =============================================
home:
    path: /
    controller: App\Controller\HomeController::index
    methods: [GET]

filieres:
    path: /filieres
    controller: App\Controller\FiliereController::index
    methods: [GET]

filiere_show:
    path: /filieres/{id}
    controller: App\Controller\FiliereController::show
    methods: [GET]
    requirements:
        id: \d+

etablissements:
    path: /etablissements
    controller: App\Controller\EtablissementController::index
    methods: [GET]

# =============================================
# BACK-OFFICE — Dashboard
# =============================================
admin_dashboard:
    path: /admin
    controller: App\Controller\AdminDashboardController::index
    methods: [GET]

# Les routes CRUD sont définies via @Route dans :
#   AdminFiliereController      → /admin/filieres  (admin_filieres_*)
#   AdminEtablissementController→ /admin/etablissements (admin_etablissements_*)
#   AdminEvenementController    → /admin/evenements (admin_evenements_*)
